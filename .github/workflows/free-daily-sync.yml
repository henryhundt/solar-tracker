name: Free Daily Sync

on:
  workflow_dispatch:
  schedule:
    # 07:17 UTC = 1:17 AM CST / 2:17 AM CDT
    - cron: "17 7 * * *"

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger hosted sync endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL and CRON_SECRET GitHub secrets are required."
            exit 1
          fi

          curl \
            --fail \
            --show-error \
            --silent \
            --retry 10 \
            --retry-delay 15 \
            --retry-all-errors \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${APP_URL%/}/api/internal/sync-all"
