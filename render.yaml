services:
  - type: web
    name: solar-tracker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SEED_ON_BOOT
        value: "false"
      - key: ENABLE_INTERNAL_SCHEDULER
        value: "false"
      - key: SYNC_TIMEZONE
        value: America/Chicago
      - key: DATABASE_URL
        sync: false
      - key: CRON_SECRET
        generateValue: true
